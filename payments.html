<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payments — Wisemonk</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,500,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand-50: #EBF2FF; --brand-100: #CCDEFF; --brand-500: #3080FF; --brand-600: #155DFC; --brand-700: #0B43B8;
      --bg: #F6F9FF; --card: #FFFFFF; --border: #E5E7EB; --border-strong: #D1D5DB;
      --text-primary: #1F2937; --text-secondary: #4A5565; --text-muted: #6A7282; --muted-bg: #F4F6F9; --danger: #E40014;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Satoshi', sans-serif; font-weight: 500; background: var(--bg); color: var(--text-primary); min-height: 100vh; }
    a { text-decoration: none; color: inherit; }
    [hidden] { display: none !important; }

    .app { display: flex; min-height: 100vh; }
    .sidebar { width: 240px; flex-shrink: 0; background: var(--card); padding: 30px 20px; display: flex; flex-direction: column; gap: 32px; }
    .sidebar-logo { display: flex; align-items: center; height: 26px; overflow: hidden; }
    .sidebar-logo img { height: 56px; width: auto; margin-top: -30px; display: block; }
    .nav-section { display: flex; flex-direction: column; }
    .nav-title { font-weight: 500; font-size: 12px; letter-spacing: 0.5px; color: var(--text-muted); padding: 8px; margin-bottom: 2px; }
    .nav-link { display: flex; align-items: center; gap: 10px; height: 38px; padding: 0 10px; border-radius: 8px; font-weight: 500; font-size: 15px; color: var(--text-secondary); transition: background 0.15s, color 0.15s; }
    .nav-link:hover { background: var(--muted-bg); }
    .nav-link.active { background: var(--brand-50); color: var(--brand-600); }
    .nav-link.active .nav-icon { color: var(--brand-600); }
    .nav-icon { width: 20px; height: 20px; flex-shrink: 0; color: var(--text-muted); display: flex; } .nav-icon svg { width: 20px; height: 20px; }
    .main-col { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .app-header { display: flex; align-items: center; justify-content: space-between; height: 80px; padding: 0 40px; background: var(--bg); }
    .app-header h1 { font-size: 23px; font-weight: 700; }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .bell-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 8px; background: transparent; border: none; color: var(--text-secondary); cursor: pointer; }
    .bell-btn:hover { background: rgba(0,0,0,0.04); } .bell-btn svg { width: 22px; height: 22px; }
    .user-chip { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 4px 8px 4px 4px; border-radius: 100px; }
    .user-chip:hover { background: rgba(0,0,0,0.04); }
    .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--brand-500); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; }
    .user-name { font-weight: 500; font-size: 15px; } .user-chev { width: 16px; height: 16px; color: var(--text-muted); }
    .shell-content { flex: 1; padding: 8px 40px 64px; overflow-y: auto; }

    /* Wisemonk table card */
    .panel { background: var(--card); border-radius: 12px; box-shadow: 0 1px 3px rgba(16,24,40,0.06), 0 1px 2px rgba(16,24,40,0.04); overflow: hidden; }
    .panel-head { padding: 22px 24px 4px; } .panel-head h2 { font-size: 22px; font-weight: 700; } .panel-head p { font-size: 14px; color: var(--text-muted); margin-top: 4px; }
    .toolbar { display: flex; align-items: center; gap: 12px; padding: 16px 24px; flex-wrap: wrap; }
    .search { position: relative; flex: 1 1 280px; max-width: 460px; }
    .search svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: #9AA2B2; }
    .search input { width: 100%; height: 42px; padding: 0 14px 0 40px; border: 1px solid #DDE1E9; border-radius: 8px; font-family: inherit; font-size: 14px; font-weight: 500; color: var(--text-primary); outline: none; transition: border-color 0.15s, box-shadow 0.15s; }
    .search input::placeholder { color: #9AA2B2; }
    .search input:hover { border-color: #DDE1E9; } .search input:focus { border-color: var(--brand-500); box-shadow: 0 0 0 3px rgba(38,132,255,0.14); }
    .toolbar-filters { display: flex; align-items: center; gap: 10px; margin-left: auto; }

    .wm-dropdown { position: relative; }
    .wm-dd-trigger { display: inline-flex; align-items: center; justify-content: space-between; gap: 12px; min-width: 160px; height: 42px; padding: 0 14px; border: 1px solid #DDE1E9; background: #fff; border-radius: 8px; font-family: inherit; font-size: 14px; font-weight: 600; color: var(--text-primary); cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s; }
    .wm-dd-trigger:hover { border-color: #9AA2B2; }
    .wm-dd-trigger > svg.lead { color: var(--text-muted); }
    .wm-dropdown.is-open .wm-dd-trigger { border-color: var(--brand-500); box-shadow: 0 0 0 3px rgba(38,132,255,0.14); }
    .wm-dd-trigger svg { width: 16px; height: 16px; color: #9AA2B2; transition: transform 0.2s; }
    .wm-dd-trigger svg.lead { transition: none; }
    .wm-dropdown.is-open .wm-dd-trigger svg.chev { transform: rotate(180deg); }
    .wm-dd-trigger .wm-dd-label { flex: 1; text-align: left; }
    .wm-dd-menu { position: absolute; top: calc(100% + 6px); right: 0; min-width: 220px; background: #fff; border: 1px solid #EEF0F4; border-radius: 12px; padding: 6px; box-shadow: 0 14px 34px -14px rgba(16,24,40,0.35); display: none; z-index: 50; }
    .wm-dropdown.is-open .wm-dd-menu { display: block; }
    .wm-dd-item { display: flex; align-items: center; justify-content: space-between; gap: 10px; width: 100%; padding: 9px 12px; border: none; background: transparent; border-radius: 6px; font-family: inherit; font-size: 14px; font-weight: 500; color: var(--text-primary); cursor: pointer; text-align: left; }
    .wm-dd-item:hover { background: var(--muted-bg); }
    .wm-dd-item.selected { background: var(--brand-50); color: var(--brand-600); font-weight: 700; }
    .wm-dd-item svg { width: 16px; height: 16px; color: var(--brand-600); opacity: 0; flex-shrink: 0; }
    .wm-dd-item.selected svg { opacity: 1; }

    .tbl { width: 100%; border-collapse: collapse; }
    .tbl thead { background: #F7F8FA; }
    .tbl thead th { text-align: left; font-size: 12.5px; font-weight: 500; color: #9AA2B2; padding: 12px 24px; border-top: 1px solid #EEF0F4; border-bottom: 1px solid #EEF0F4; }
    .tbl thead th:last-child { text-align: right; }
    .tbl tbody td { padding: 16px 24px; font-size: 14px; font-weight: 500; color: var(--text-secondary); border-bottom: 1px solid #EEF0F4; }
    .tbl tbody tr:last-child td { border-bottom: none; } .tbl tbody tr:hover { background: #F7F8FA; }
    .tbl td.actions { text-align: right; }
    .kebab { width: 32px; height: 32px; border: none; background: transparent; border-radius: 8px; cursor: pointer; color: var(--text-secondary); display: inline-flex; align-items: center; justify-content: center; }
    .kebab:hover { background: var(--muted-bg); } .kebab svg { width: 20px; height: 20px; }
    .row-menu { position: fixed; z-index: 90; background: #fff; border: 1px solid var(--border); border-radius: 10px; box-shadow: 0 14px 34px -14px rgba(16,24,40,0.35); padding: 6px; min-width: 168px; }
    .row-menu[hidden] { display: none; }
    .rm-item { display: block; width: 100%; text-align: left; padding: 9px 12px; border: none; background: transparent; border-radius: 7px; font-family: inherit; font-size: 14px; font-weight: 500; color: var(--text-primary); cursor: pointer; }
    .rm-item:hover { background: var(--muted-bg); }

    @media (max-width: 860px) { .sidebar { display: none; } .app-header, .shell-content { padding-left: 16px; padding-right: 16px; } }
  </style>
</head>
<body>

    <symbol id="ic-search" viewBox="0 0 24 24" fill="none"><path d="M11.5 21C16.7467 21 21 16.7467 21 11.5C21 6.25329 16.7467 2 11.5 2C6.25329 2 2 6.25329 2 11.5C2 16.7467 6.25329 21 11.5 21Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M22 22L20 20" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></symbol>

    <symbol id="ic-more" viewBox="0 0 24 24"><circle cx="5" cy="12" r="1.7" fill="currentColor"/><circle cx="12" cy="12" r="1.7" fill="currentColor"/><circle cx="19" cy="12" r="1.7" fill="currentColor"/></symbol>
    <symbol id="ic-check" viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></symbol>
  </svg>

  <div class="app">
    <aside class="sidebar">
      <a href="dashboard.html" class="sidebar-logo"><img src="wisemonk_logo_final.png" alt="Wisemonk"></a>
      <nav class="nav-section">
        <div class="nav-title">WORKSPACE</div>
        <a href="dashboard.html" class="nav-link"><span class="nav-icon"><svg viewBox="0 0 24 24"><use href="#ic-home-2"/></svg></span>Home</a>
        <a href="clients.html" class="nav-link"><span class="nav-icon"><svg viewBox="0 0 24 24"><use href="#ic-user"/></svg></span>Clients</a>
        <a href="requests.html" class="nav-link"><span class="nav-icon"><svg viewBox="0 0 24 24"><use href="#ic-receipt-text"/></svg></span>Requests</a>
        <a href="payments.html" class="nav-link active"><span class="nav-icon"><svg viewBox="0 0 24 24"><use href="#ic-dollar-square"/></svg></span>Payments</a>
      </nav>
    </aside>

    <div class="main-col">
      <header class="app-header">
        <h1>Welcome back!</h1>
        <div class="header-right">
          <button class="bell-btn" aria-label="Notifications"><svg viewBox="0 0 24 24"><use href="#ic-notification"/></svg></button>
          <div class="user-chip"><span class="user-avatar">SJ</span><span class="user-name">Rahul</span><svg class="user-chev" viewBox="0 0 24 24"><use href="#ic-arrow-down"/></svg></div>
        </div>
      </header>

      <div class="shell-content">
        <div class="panel">
          <div class="panel-head"><h2>Payments</h2><p>Manage and track your earnings and payment</p></div>
          <div class="toolbar">
            <div class="search"><svg viewBox="0 0 24 24"><use href="#ic-search"/></svg><input type="text" placeholder="Search payments" id="searchInput"></div>
            <div class="toolbar-filters">
              <div class="wm-dropdown" data-filter="currency">
                <button class="wm-dd-trigger" type="button"><span class="wm-dd-label">All currencies</span><svg class="chev" viewBox="0 0 24 24"><use href="#ic-arrow-down"/></svg></button>
                <div class="wm-dd-menu">
                  <button class="wm-dd-item selected" data-value="">All currencies<svg viewBox="0 0 24 24"><use href="#ic-check"/></svg></button>
                  <button class="wm-dd-item" data-value="usd">USD<svg viewBox="0 0 24 24"><use href="#ic-check"/></svg></button>
                </div>
              </div>
              <div class="wm-dropdown" data-filter="period">
                <button class="wm-dd-trigger" type="button"><svg class="lead" viewBox="0 0 24 24"><use href="#ic-calendar"/></svg><span class="wm-dd-label">All time</span><svg class="chev" viewBox="0 0 24 24"><use href="#ic-arrow-down"/></svg></button>
                <div class="wm-dd-menu">
                  <button class="wm-dd-item selected" data-value="">All time<svg viewBox="0 0 24 24"><use href="#ic-check"/></svg></button>
                  <button class="wm-dd-item" data-value="month">This month<svg viewBox="0 0 24 24"><use href="#ic-check"/></svg></button>
                  <button class="wm-dd-item" data-value="quarter">Last 3 months<svg viewBox="0 0 24 24"><use href="#ic-check"/></svg></button>
                  <button class="wm-dd-item" data-value="year">This year<svg viewBox="0 0 24 24"><use href="#ic-check"/></svg></button>
                </div>
              </div>
            </div>
          </div>
          <table class="tbl">
            <thead><tr><th>Payment date</th><th>Currency</th><th>Amount</th><th>Actions</th></tr></thead>

              <tr data-currency="usd"><td>Aug 12, 2025</td><td>USD</td><td>$3,120.50</td><td class="actions"><button class="kebab"><svg viewBox="0 0 24 24"><use href="#ic-more"/></svg></button></td></tr>

        </div>
      </div>

  </div>

  <div class="row-menu" id="rowMenu" hidden>
    <button class="rm-item">View receipt</button>
    <button class="rm-item">Download statement</button>
  </div>

  <script>
    // Search + filter dropdowns
    const searchInput = document.getElementById('searchInput');
    const rows = [...document.querySelectorAll('.tbl tbody tr')];
    const rowKeys = new Set(); rows.forEach(r => Object.keys(r.dataset).forEach(k => rowKeys.add(k)));
    const filters = {};
    function applyFilters(){
      const q = searchInput.value.toLowerCase();
      rows.forEach(tr => {
        const okText = tr.textContent.toLowerCase().includes(q);
        const okFilters = Object.entries(filters).every(([k, v]) => !v || !rowKeys.has(k) || tr.dataset[k] === v);
        tr.style.display = (okText && okFilters) ? '' : 'none';
      });
    }
    searchInput.addEventListener('input', applyFilters);

    document.querySelectorAll('.wm-dropdown').forEach(dd => {
      const trigger = dd.querySelector('.wm-dd-trigger');
      const label = dd.querySelector('.wm-dd-label');
      const key = dd.dataset.filter;
      filters[key] = '';
      trigger.addEventListener('click', e => {
        e.stopPropagation();
        const open = dd.classList.contains('is-open');
        document.querySelectorAll('.wm-dropdown.is-open').forEach(o => o.classList.remove('is-open'));
        if (!open) dd.classList.add('is-open');
      });
      dd.querySelectorAll('.wm-dd-item').forEach(item => item.addEventListener('click', e => {
        e.stopPropagation();
        dd.querySelectorAll('.wm-dd-item').forEach(i => i.classList.remove('selected'));
        item.classList.add('selected');
        label.textContent = item.childNodes[0].textContent.trim();
        filters[key] = item.dataset.value;
        dd.classList.remove('is-open');
        applyFilters();
      }));
    });

    const rowMenu = document.getElementById('rowMenu');
    document.querySelectorAll('.kebab').forEach(k => k.addEventListener('click', e => {
      e.stopPropagation();
      const r = k.getBoundingClientRect();
      rowMenu.hidden = false;
      rowMenu.style.top = (r.bottom + 6) + 'px';
      rowMenu.style.left = (r.right - rowMenu.offsetWidth) + 'px';
    }));
    rowMenu.addEventListener('click', e => { e.stopPropagation(); rowMenu.hidden = true; });
    document.addEventListener('click', () => { rowMenu.hidden = true; document.querySelectorAll('.wm-dropdown.is-open').forEach(o => o.classList.remove('is-open')); });
  </script>
  <script defer src="https://anjuchorotiya.github.io/Freelancer-portal/wisemonk-ui/dev-notes.js"></script>
