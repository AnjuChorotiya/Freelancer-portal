<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App shell — Wisemonk portal nav + header</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,500,400&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300&display=swap" rel="stylesheet">
  <!-- Exact nav + header copied verbatim from the live freelancer portal
       (freelancers.html / home.html). Only the icon-sprite and logo paths are
       adapted to this folder; the CSS, markup and toggle JS are unchanged. -->
  <style>
    :root {
      --primary-50: #E8F2FF;
      --primary-100: #C5DCFF;
      --primary-500: #2684FF;
      --primary-600: #1A6FE0;
      --primary-700: #1059BD;
      --accent-500: #2684FF;
      --accent-tint: rgba(38, 132, 255, 0.10);
      --neutral-0: #FFFFFF;
      --neutral-50: #F7F8FA;
      --neutral-100: #EEF0F4;
      --neutral-200: #DDE1E9;
      --neutral-300: #C4CAD6;
      --neutral-400: #9AA2B2;
      --neutral-500: #6B7588;
      --neutral-700: #363D4D;
      --neutral-800: #222733;
      --neutral-900: #121620;
      --grey-300: #ABADB1;
      --grey-700: #222224;
      --bg-subtle: #F1F8FF;
      --border: #EEF0F4;
      --border-strong: #DDE1E9;
      --text-primary: #222733;
      --text-secondary: #363D4D;
      --text-muted: #9AA2B2;
      --success-50: #E6F9F0;
      --success-500: #12B76A;
      --success-700: #027A48;
      --warning-50: #FFFAEB;
      --warning-700: #B54708;
      --radius-md: 12px;
      --radius-full: 100px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Satoshi', sans-serif; background: var(--bg-subtle); color: var(--text-primary); min-height: 100vh; }
    a { text-decoration: none; color: inherit; }

    .app { display: flex; min-height: 100vh; }

    /* Sidebar (shared) */
    .sidebar { width: 240px; flex-shrink: 0; background: var(--neutral-0); border-right: 1px solid var(--border); padding: 30px 20px; display: flex; flex-direction: column; gap: 32px; }
    .sidebar-logo { display: flex; align-items: center; gap: 10px; height: 26px; overflow: hidden; }
    .sidebar-logo img { height: 56px; width: auto; margin-top: -30px; display: block; }
    .nav-section { display: flex; flex-direction: column; }
    .nav-title { font-family: 'Satoshi', sans-serif; font-weight: 300; font-size: 13px; letter-spacing: 0.5px; color: var(--grey-300); padding: 8px; margin-bottom: 2px; }
    .nav-link { display: flex; align-items: center; gap: 10px; height: 36px; padding: 0 8px; border-radius: 8px; font-weight: 500; font-size: 15px; color: var(--grey-700); transition: background 0.15s; }
    .nav-link:hover { background: var(--neutral-50); }
    .nav-link.active { background: var(--accent-tint); color: var(--accent-500); }
    .nav-link.active .nav-icon { color: var(--accent-500); }
    .nav-icon { width: 20px; height: 20px; flex-shrink: 0; color: var(--grey-700); }
    .nav-parent { display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
    .nav-parent .nav-chev { width: 16px; height: 16px; color: var(--grey-700); transition: transform 0.2s; }
    .nav-parent.open .nav-chev { transform: rotate(180deg); }
    .nav-children { display: flex; flex-direction: column; margin-left: 30px; margin-top: 2px; }
    .nav-children .nav-link { font-size: 14.5px; }

    /* Main */
    .main-col { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .content { flex: 1; padding: 8px 40px 56px; }

    /* Header */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      height: 80px;
      padding: 0 40px;
      background: var(--bg-subtle);
    }
    .header h1 {
      font-family: 'Satoshi', sans-serif;
      font-weight: 700;
      font-size: 23px;
      color: #222224;
      margin: 0;
    }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .bell-btn {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 8px;
      background: transparent;
      border: none;
      color: #404145;
      cursor: pointer;
    }
    .bell-btn:hover { background: rgba(0,0,0,0.04); }
    .bell-btn svg { width: 22px; height: 22px; }
    .user-chip {
      display: flex; align-items: center; gap: 8px;
      cursor: pointer;
      padding: 4px 8px 4px 4px;
      border-radius: 100px;
      flex-shrink: 0;
    }
    .user-avatar {
      width: 32px; height: 32px;
      min-width: 32px;
      border-radius: 50%;
      background: var(--accent-500);
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .user-name { font-weight: 500; font-size: 16px; color: var(--grey-700); white-space: nowrap; }
    .user-chev { width: 16px; height: 16px; color: #85878d; flex-shrink: 0; }

    @media (max-width: 900px) {
      .sidebar { display: none; }
      .header { padding: 16px 20px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <a href="home.html" class="sidebar-logo">
        <img src="../wisemonk_logo_final.png" alt="Wisemonk">
      </a>
      <nav class="nav-section">
        <div class="nav-title">WORKSPACE</div>
        <a href="home.html" class="nav-link">
          <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><use href="iconsax-sprite.svg#ic-home-2"/></svg></span>
          Home
        </a>
        <a href="freelancers.html" class="nav-link active">
          <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><use href="iconsax-sprite.svg#ic-profile-2user"/></svg></span>
          Freelancers
        </a>
        <a href="invoices.html" class="nav-link">
          <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><use href="iconsax-sprite.svg#ic-receipt-text"/></svg></span>
          Invoices
        </a>
        <div class="nav-link nav-parent open" id="timeParent">
          <div style="display:flex; align-items:center; gap:10px;">
            <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><use href="iconsax-sprite.svg#ic-clock"/></svg></span>
            Time
          </div>
          <svg class="nav-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><use href="iconsax-sprite.svg#ic-arrow-down"/></svg>
        </div>
        <div class="nav-children" id="timeChildren">
          <a href="time-leaves.html" class="nav-link">Leaves</a>
          <a href="time-attendance.html" class="nav-link">Attendance</a>
        </div>
      </nav>
    </aside>

    <div class="main-col">

      <header class="header">
        <h1>Good Morning, Aman!</h1>
        <div class="header-right">
          <button class="bell-btn" aria-label="Notifications"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><use href="iconsax-sprite.svg#ic-notification"/></svg></button>
          <div class="user-chip">
            <span class="user-avatar">AS</span>
            <span class="user-name">Aman Singh</span>
            <svg class="user-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><use href="iconsax-sprite.svg#ic-arrow-down"/></svg>
          </div>
        </div>
      </header>

      <div class="content">
        <!-- page content goes here -->
      </div>

    </div>
  </div>

  <script>
    // exact portal nav toggle
    var timeParent=document.getElementById('timeParent');
    var timeChildren=document.getElementById('timeChildren');
    if(timeParent&&timeChildren){ timeParent.addEventListener('click', function(){ var open=timeParent.classList.toggle('open'); timeChildren.style.display=open?'flex':'none'; }); }
  </script>
</body>
</html>
